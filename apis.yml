aid: art-blocks
url: https://raw.githubusercontent.com/api-evangelist/art-blocks/refs/heads/main/apis.yml
name: Art Blocks
kind: company
description: 'Art Blocks is the leading on-chain generative art platform where artists
  deploy deterministic code to Ethereum, Arbitrum One, and Base; each token is minted
  by invoking the script with a unique hash, producing a one-of-a-kind artwork stored
  permanently on-chain. The platform exposes four public API surfaces: a Token API
  that returns ERC-721 metadata conforming to the OpenSea standard, a Generator API
  that serves an iframe-able live view of each artwork, a Media Proxy API that provides
  static PNG renders, and a Hasura GraphQL API (data.artblocks.io) that gives structured
  access to on-chain and off-chain data including projects, tokens, artists, features,
  minting configuration, and ownership. Decentralised access is available through
  The Graph subgraph for on-chain-only data across all three networks. An MCP Server
  with 21 tools enables AI-agent integration for querying, minting, and generative
  script scaffolding.'
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
