- aid: art-blocks:mcp-server
  name: Art Blocks MCP Server
  description: Model Context Protocol server exposing 21 tools for AI agents to interact
    with the Art Blocks ecosystem across Ethereum, Arbitrum, and Base. Tools cover
    discovering projects, exploring artist portfolios, checking mint eligibility,
    building and submitting mint transactions, exploring table schemas, constructing
    and executing GraphQL queries, and scaffolding generative art scripts. Uses OAuth
    2.1 with Dynamic Client Registration; supports Authorization Code + PKCE for browser
    clients and Device Authorization flow for headless agents.
  humanURL: https://docs.artblocks.io/developer/mcp-server/quick-start/
  baseURL: https://mcp.artblocks.io
