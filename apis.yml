apis:
- aid: art-blocks:token-api
  name: Art Blocks Token API
  description: Returns ERC-721 token metadata for any Art Blocks token conforming
    to the OpenSea metadata standard. The response includes the live view URL (Generator)
    and media proxy URL (static PNG) so integrators can obtain all asset links from
    a single call. Available across Ethereum (chain 1), Arbitrum One (chain 42161),
    and Base (chain 8453) mainnet, plus Sepolia testnet.
  humanURL: https://docs.artblocks.io/developer/token-and-generator-apis/
  baseURL: https://token.artblocks.io
  tags:
  - Token Metadata
  - ERC-721
  - NFT
  - Ethereum
  - Arbitrum
  - Base
  properties:
  - type: Documentation
    url: https://docs.artblocks.io/developer/token-and-generator-apis/
  - type: OpenAPI
    url: openapi/art-blocks-token-api.json
  - url: graphql/art-blocks-graphql.md
    type: GraphQL
- aid: art-blocks:generator-api
  name: Art Blocks Generator API
  description: Returns an iframe-able live view of the generative artwork for a given
    token. The generator runs the artist's script in the browser using the token's
    deterministic hash as a seed, producing the canonical on-chain artwork output.
    Useful for embedding live artwork in external applications and marketplaces.
  humanURL: https://docs.artblocks.io/developer/token-and-generator-apis/
  baseURL: https://generator.artblocks.io
  tags:
  - Generative Art
  - Live View
  - iframe
  - NFT
  - Ethereum
  - Arbitrum
  - Base
  properties:
  - type: Documentation
    url: https://docs.artblocks.io/developer/token-and-generator-apis/
  - type: OpenAPI
    url: openapi/art-blocks-generator-api.json
- aid: art-blocks:media-proxy-api
  name: Art Blocks Media Proxy API
  description: Serves static PNG renders of Art Blocks token artwork captured by a
    headless browser. These are the canonical static images used on the Art Blocks
    platform and by NFT marketplaces. Images are accessible at a predictable URL pattern
    keyed by chain ID, contract address, and token ID.
  humanURL: https://docs.artblocks.io/developer/token-and-generator-apis/
  baseURL: https://media-proxy.artblocks.io
  tags:
  - Media
  - Static Image
  - PNG
  - NFT
  - Ethereum
  - Arbitrum
  - Base
  properties:
  - type: Documentation
    url: https://docs.artblocks.io/developer/token-and-generator-apis/
  - type: OpenAPI
    url: openapi/art-blocks-media-proxy-api.json
- aid: art-blocks:graphql-api
  name: Art Blocks GraphQL API (Hasura)
  description: Hasura-backed GraphQL API providing structured access to on-chain and
    off-chain Art Blocks data including projects, tokens, artists, contracts, minter
    configurations, features, tags, and ownership. All queries support filtering by
    chain_id to scope to Ethereum, Arbitrum One, or Base. Primary tables include projects_metadata,
    tokens_metadata, contracts_metadata, and project_minter_configurations. An interactive
    Hasura playground is publicly available for ad-hoc exploration. Authentication
    via JWT obtained by signing a message with an Ethereum wallet.
  humanURL: https://docs.artblocks.io/developer/graphql/
  baseURL: https://data.artblocks.io
  tags:
  - GraphQL
  - Projects
  - Tokens
  - Artists
  - Features
  - Minting
  - Ethereum
  - Arbitrum
  - Base
  properties:
  - type: Documentation
    url: https://docs.artblocks.io/developer/graphql/
  - type: GraphQL
    url: https://data.artblocks.io/v1/graphql
  - type: Playground
    url: https://cloud.hasura.io/public/graphiql?endpoint=https://data.artblocks.io/v1/graphql
