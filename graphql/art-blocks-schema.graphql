input String_comparison_exp {
  _eq: String
  _neq: String
  _in: [String!]
  _nin: [String!]
  _is_null: Boolean
  _like: String
  _ilike: String
  _nlike: String
  _nilike: String
  _gt: String
  _gte: String
  _lt: String
  _lte: String
}

