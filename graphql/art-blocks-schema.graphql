# ─────────────────────────────────────────────
# Root types
# ─────────────────────────────────────────────

type query_root {
  # Projects
  projects_metadata(where: projects_metadata_bool_exp, order_by: [projects_metadata_order_by!], limit: Int, offset: Int): [projects_metadata!]!
  projects_metadata_by_pk(id: String!): projects_metadata

  # Tokens
  tokens_metadata(where: tokens_metadata_bool_exp, order_by: [tokens_metadata_order_by!], limit: Int, offset: Int): [tokens_metadata!]!
  tokens_metadata_by_pk(id: String!): tokens_metadata

  # Contracts
  contracts_metadata(where: contracts_metadata_bool_exp, order_by: [contracts_metadata_order_by!], limit: Int, offset: Int): [contracts_metadata!]!
  contracts_metadata_by_pk(address: String!, chain_id: Int!): contracts_metadata

  # Users
  users(where: users_bool_exp, order_by: [users_order_by!], limit: Int, offset: Int): [users!]!
  users_by_pk(public_address: String!): users

  # Artists
  artists(where: artists_bool_exp, order_by: [artists_order_by!], limit: Int, offset: Int): [artists!]!
  artists_by_pk(id: Int!): artists

  # Transfers
  transfers_metadata(where: transfers_metadata_bool_exp, order_by: [transfers_metadata_order_by!], limit: Int, offset: Int): [transfers_metadata!]!
  transfers_metadata_by_pk(id: String!): transfers_metadata

  # Minters
  minters_metadata(where: minters_metadata_bool_exp, limit: Int, offset: Int): [minters_metadata!]!
  minters_metadata_by_pk(address: String!, chain_id: Int!): minters_metadata

  # Minter filters
  minter_filters_metadata(limit: Int, offset: Int): [minter_filters_metadata!]!
  minter_filters_metadata_by_pk(address: String!, chain_id: Int!): minter_filters_metadata

  # Project minter configs
  project_minter_configurations(where: project_minter_configurations_bool_exp, limit: Int, offset: Int): [project_minter_configurations!]!
  project_minter_configurations_by_pk(id: String!): project_minter_configurations

  # Bids
  bids_metadata(where: bids_metadata_bool_exp, order_by: [bids_metadata_order_by!], limit: Int, offset: Int): [bids_metadata!]!
  bids_metadata_by_pk(id: String!): bids_metadata
  bids_metadata_aggregate(where: bids_metadata_bool_exp): bids_metadata_aggregate!

  # Receipts
  receipt_metadata(where: receipt_metadata_bool_exp, limit: Int, offset: Int): [receipt_metadata!]!
  receipt_metadata_by_pk(id: String!): receipt_metadata

  # Favorites
  favorites(where: favorites_bool_exp, order_by: [favorites_order_by!], limit: Int, offset: Int): [favorites!]!
  favorites_by_pk(id: Int!): favorites

  # Tags
  tags(where: tags_bool_exp, order_by: [tags_order_by!], limit: Int, offset: Int): [tags!]!
  tags_by_pk(name: String!): tags

  # Dependencies
  dependencies_metadata(where: dependencies_metadata_bool_exp, limit: Int, offset: Int): [dependencies_metadata!]!
  dependencies_metadata_by_pk(name_and_version: String!, chain_id: Int!): dependencies_metadata

  # Dependency registries
  dependency_registries(limit: Int, offset: Int): [dependency_registries!]!
  dependency_registries_by_pk(address: String!, chain_id: Int!): dependency_registries

  # Partners
  partners(where: partners_bool_exp, order_by: [partners_order_by!], limit: Int, offset: Int): [partners!]!
  partners_by_pk(id: Int!): partners

  # Project verticals
  project_verticals(limit: Int, offset: Int): [project_verticals!]!
  project_verticals_by_pk(name: verticals_enum!): project_verticals

  # User profiles
  user_profiles(where: user_profiles_bool_exp, limit: Int, offset: Int): [user_profiles!]!
  user_profiles_by_pk(id: Int!): user_profiles

  # Showcases
  showcases(where: showcases_bool_exp, limit: Int, offset: Int): [showcases!]!
  showcases_by_pk(id: uuid!): showcases

  # Achievements
  achievements(limit: Int, offset: Int): [achievements!]!
  achievements_by_pk(id: Int!): achievements

  # Sets
  sets(limit: Int, offset: Int): [sets!]!
  sets_by_pk(id: Int!): sets

  # Aggregates
  projects_metadata_aggregate(where: projects_metadata_bool_exp): projects_metadata_aggregate!
  tokens_metadata_aggregate(where: tokens_metadata_bool_exp): tokens_metadata_aggregate!
}

type subscription_root {
  projects_metadata(where: projects_metadata_bool_exp, order_by: [projects_metadata_order_by!], limit: Int, offset: Int): [projects_metadata!]!
  projects_metadata_by_pk(id: String!): projects_metadata
  projects_metadata_stream(batch_size: Int!, cursor: [projects_metadata_stream_cursor_input!]!, where: projects_metadata_bool_exp): [projects_metadata!]!

  tokens_metadata(where: tokens_metadata_bool_exp, order_by: [tokens_metadata_order_by!], limit: Int, offset: Int): [tokens_metadata!]!
  tokens_metadata_by_pk(id: String!): tokens_metadata
  tokens_metadata_stream(batch_size: Int!, cursor: [tokens_metadata_stream_cursor_input!]!, where: tokens_metadata_bool_exp): [tokens_metadata!]!

  transfers_metadata(where: transfers_metadata_bool_exp, order_by: [transfers_metadata_order_by!], limit: Int, offset: Int): [transfers_metadata!]!
  transfers_metadata_stream(batch_size: Int!, cursor: [transfers_metadata_stream_cursor_input!]!, where: transfers_metadata_bool_exp): [transfers_metadata!]!

  bids_metadata(where: bids_metadata_bool_exp, order_by: [bids_metadata_order_by!], limit: Int, offset: Int): [bids_metadata!]!
  bids_metadata_stream(batch_size: Int!, cursor: [bids_metadata_stream_cursor_input!]!, where: bids_metadata_bool_exp): [bids_metadata!]!
}

schema {
  query: query_root
  subscription: subscription_root
}

